<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUTSAN — Back-office Nutritionniste</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f8f4}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;border:none;background:#2A9420;color:#fff;border-radius:6px;cursor:pointer}
input,textarea{width:100%;padding:8px;margin-top:5px;margin-bottom:10px}
.msg{padding:8px;border-radius:8px;margin:5px 0}
.me{background:#2A9420;color:#fff;text-align:right}
.other{background:#eee}
</style>
</head>
<body>

<h2>🩺 Back-office Nutritionniste (NUTSAN)</h2>

<!-- LOGIN NUTRI -->
<div class="card">
<h3>Connexion Nutritionniste</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Connexion</button>
</div>

<!-- PATIENTS -->
<div class="card">
<h3>👥 Liste des patients</h3>
<div id="patients"></div>
</div>

<!-- PRESCRIPTION -->
<div class="card">
<h3>📄 Envoyer prescription</h3>
<input id="patientId" placeholder="ID patient">
<input type="file" id="prescription">
<button onclick="sendPrescription()">Envoyer</button>
</div>

<!-- RESULTATS PATIENT -->
<div class="card">
<h3>📂 Résultats patients</h3>
<div id="results"></div>
</div>

<!-- CHAT -->
<div class="card">
<h3>💬 Chat avec patient</h3>
<input id="chatPatientId" placeholder="ID patient">
<div id="chatBox"></div>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Envoyer</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ⚠️ REMPLACE PAR TA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDFt9q5ny7LW8bllLzsFL0lr5T9U4LXD2A",
  authDomain: "nutsan-e226-16cfe.firebaseapp.com",
  projectId: "nutsan-e226-16cfe",
  storageBucket: "nutsan-e226-16cfe.firebasestorage.app",
  messagingSenderId: "1034994184929",
  appId: "1:1034994184929:web:5bd47d57c17a374960bda0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// LOGIN
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);
  alert("Connecté");
  loadPatients();
  loadResults();
}

// LOAD PATIENTS
function loadPatients(){
  onSnapshot(collection(db, "patients"), (snap)=>{
    let html="";
    snap.forEach(doc=>{
      html += `<p>${doc.id}</p>`;
    });
    document.getElementById("patients").innerHTML = html;
  });
}

// SEND PRESCRIPTION
window.sendPrescription = async function(){
  const file = document.getElementById("prescription").files[0];
  const patientId = document.getElementById("patientId").value;

  const storageRef = ref(storage, "prescriptions/" + patientId + "/" + file.name);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "prescriptions"), {
    patientId: patientId,
    file: url,
    date: Date.now()
  });

  alert("Prescription envoyée");
}

// LOAD RESULTS
function loadResults(){
  onSnapshot(collection(db, "results"), (snap)=>{
    let html="";
    snap.forEach(doc=>{
      const r = doc.data();
      html += `<p><a href="${r.file}" target="_blank">${r.name}</a></p>`;
    });
    document.getElementById("results").innerHTML = html;
  });
}

// CHAT
window.sendMsg = async function(){
  const text = document.getElementById("msg").value;
  const patientId = document.getElementById("chatPatientId").value;

  await addDoc(collection(db, "messages"), {
    text: text,
    to: patientId,
    from: auth.currentUser.uid,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}

onSnapshot(collection(db, "messages"), (snap)=>{
  let html="";
  snap.forEach(doc=>{
    const m = doc.data();
    html += `<div class="msg ${m.from===auth.currentUser?.uid?'me':'other'}">${m.text}</div>`;
  });
  document.getElementById("chatBox").innerHTML = html;
});

</script>

</body>
</html>
