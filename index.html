<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUTSAN — Version Finale Corrigée</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;overflow:hidden}
.screen{
  display:none;
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow-y:auto;
  background:#f0f4ee;
}
.screen.active{
  display:block;
  animation:fadeSlide .3s ease;
}
@keyframes fadeSlide{
  from{opacity:0; transform:translateX(20px)}
  to{opacity:1; transform:translateX(0)}
}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="screen active">
  <h2>NUTSAN</h2>
  <button onclick="showScreen('register')">Créer compte</button>
  <button onclick="showScreen('login')">Connexion</button>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
  <h3>Inscription</h3>
  <input id="email" placeholder="email"><br>
  <input id="pass" type="password" placeholder="mot de passe"><br>
  <button onclick="goToPayment()">Continuer</button>
  <button onclick="showScreen('landing')">Retour</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <h3>Connexion</h3>
  <input id="login-email" placeholder="email"><br>
  <input id="login-pass" type="password" placeholder="mot de passe"><br>
  <button onclick="patientLogin()">Se connecter</button>
  <button onclick="showScreen('landing')">Retour</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <h3>Bienvenue</h3>
  <button onclick="logoutAll()">Déconnexion</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, setDoc, doc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFt9q5ny7LW8bllLzsFL0lr5T9U4LXD2A",
  authDomain: "nutsan-e226-16cfe.firebaseapp.com",
  projectId: "nutsan-e226-16cfe",
  storageBucket: "nutsan-e226-16cfe.firebasestorage.app",
  messagingSenderId: "1034994184929",
  appId: "1:1034994184929:web:5bd47d57c17a374960bda0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// NAVIGATION
window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

// REGISTER
window.goToPayment = () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;

  if(pass.length < 6){
    alert("Mot de passe trop court");
    return;
  }

  window.tempUser = { email, pass };
  submitPayment();
};

// CREATE ACCOUNT
window.submitPayment = async () => {
  try{
    const u = window.tempUser;
    const cred = await createUserWithEmailAndPassword(auth, u.email, u.pass);

    await setDoc(doc(db, "profiles", cred.user.uid), {
      email: u.email,
      role: "patient",
      createdAt: serverTimestamp()
    });

    await addDoc(collection(db, "pendingPayments"), {
      userId: cred.user.uid,
      status: "pending",
      createdAt: serverTimestamp()
    });

    alert("Compte créé");
    showScreen('app');

  }catch(e){ alert(e.message); }
};

// LOGIN
window.patientLogin = async () => {
  try{
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;

    await signInWithEmailAndPassword(auth, email, pass);
    showScreen('app');

  }catch(e){ alert(e.message); }
};

// LOGOUT
window.logoutAll = async () => {
  await signOut(auth);
  showScreen('landing');
};

// SESSION
onAuthStateChanged(auth, user => {
  if(user){ showScreen('app'); }
});

</script>

</body>
</html>
